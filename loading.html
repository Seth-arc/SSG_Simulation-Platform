<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Economic Statecraft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&amp;family=Montserrat:wght@200;300&amp;display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
    }

    .sphere {
      border-radius: 50%;
      position: absolute;
      filter: blur(0.5px);
    }

    /* US - Blue sphere */
    .sphere-us {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 35% 35%, rgba(31, 78, 121, 0.85), rgba(18, 47, 73, 0.9));
      box-shadow: 0 0 60px rgba(31, 78, 121, 0.2), inset 0 0 40px rgba(255, 255, 255, 0.1);
      animation: orbit-us 28s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      top: 50%;
      left: 50%;
      margin-top: -100px;
      margin-left: -100px;
    }

    /* Allies - Green sphere */
    .sphere-allies {
      width: 150px;
      height: 150px;
      background: radial-gradient(circle at 35% 35%, rgba(42, 111, 76, 0.8), rgba(28, 73, 50, 0.85));
      box-shadow: 0 0 50px rgba(42, 111, 76, 0.15), inset 0 0 35px rgba(255, 255, 255, 0.1);
      animation: orbit-allies 28s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      top: 50%;
      left: 50%;
      margin-top: -75px;
      margin-left: -75px;
    }

    /* China - Red sphere */
    .sphere-china {
      width: 190px;
      height: 190px;
      background: radial-gradient(circle at 35% 35%, rgba(139, 35, 35, 0.85), rgba(89, 22, 22, 0.9));
      box-shadow: 0 0 60px rgba(139, 35, 35, 0.2), inset 0 0 40px rgba(255, 255, 255, 0.1);
      animation: orbit-china 28s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
      top: 50%;
      left: 50%;
      margin-top: -95px;
      margin-left: -95px;
    }

    @keyframes orbit-us {
      0%, 100% {
        transform: translate(-150px, -60px);
      }
      25% {
        transform: translate(-110px, 80px);
      }
      50% {
        transform: translate(60px, 70px);
      }
      75% {
        transform: translate(120px, -50px);
      }
    }

    @keyframes orbit-allies {
      0%, 100% {
        transform: translate(140px, 50px);
      }
      25% {
        transform: translate(-40px, 110px);
      }
      50% {
        transform: translate(-150px, -10px);
      }
      75% {
        transform: translate(30px, -100px);
      }
    }

    @keyframes orbit-china {
      0%, 100% {
        transform: translate(70px, -90px);
      }
      25% {
        transform: translate(130px, 30px);
      }
      50% {
        transform: translate(-110px, 60px);
      }
      75% {
        transform: translate(-140px, -40px);
      }
    }

    /* Refined connection arcs */
    .connection-arc {
      position: absolute;
      stroke-linecap: round;
      fill: none;
      stroke-width: 1;
      opacity: 0.12;
      animation: pulse-arc 6s ease-in-out infinite;
    }

    @keyframes pulse-arc {
      0%, 100% { 
        opacity: 0.12;
        stroke-dashoffset: 0;
      }
      50% { 
        opacity: 0.22;
        stroke-dashoffset: 100;
      }
    }

    /* Economic flow indicators */
    .flow-node {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      opacity: 0;
      animation: flow-pulse 8s ease-in-out infinite;
    }

    @keyframes flow-pulse {
      0%, 100% {
        opacity: 0;
        transform: scale(0);
      }
      15% {
        opacity: 0.5;
        transform: scale(1.5);
      }
      30% {
        opacity: 0;
        transform: scale(0);
      }
    }

    .flow-1 { top: 48%; left: 35%; background: #1F4E79; animation-delay: 0s; }
    .flow-2 { top: 52%; left: 58%; background: #2A6F4C; animation-delay: -2.7s; }
    .flow-3 { top: 50%; left: 46%; background: #8B2323; animation-delay: -5.3s; }
    .flow-4 { top: 46%; left: 52%; background: #1F4E79; animation-delay: -1.3s; }
    .flow-5 { top: 54%; left: 42%; background: #2A6F4C; animation-delay: -4s; }
    .flow-6 { top: 49%; left: 64%; background: #8B2323; animation-delay: -6.7s; }

    /* Strategic position markers */
    .position-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid;
      opacity: 0;
      animation: ring-expand 5s ease-out infinite;
    }

    @keyframes ring-expand {
      0% {
        opacity: 0.3;
        transform: scale(0.8);
      }
      100% {
        opacity: 0;
        transform: scale(1.8);
      }
    }

    .ring-us { 
      width: 200px; height: 200px; 
      border-color: rgba(31, 78, 121, 0.4);
      top: 50%; left: 50%;
      margin-top: -100px; margin-left: -100px;
    }
    
    .ring-allies { 
      width: 150px; height: 150px; 
      border-color: rgba(42, 111, 76, 0.4);
      top: 50%; left: 50%;
      margin-top: -75px; margin-left: -75px;
      animation-delay: -1.7s;
    }
    
    .ring-china { 
      width: 190px; height: 190px; 
      border-color: rgba(139, 35, 35, 0.4);
      top: 50%; left: 50%;
      margin-top: -95px; margin-left: -95px;
      animation-delay: -3.3s;
    }

    /* Subtle texture overlay */
    .texture-overlay {
      position: absolute;
      inset: 0;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(0, 0, 0, 0.01) 1px, transparent 1px),
        radial-gradient(circle at 80% 70%, rgba(0, 0, 0, 0.01) 1px, transparent 1px);
      background-size: 40px 40px, 60px 60px;
      opacity: 0.4;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>

  <script>
    const defaultConfig = {
      main_title: 'Economic Statecraft',
      subtitle: 'Strategic Competition in the Indo-Pacific',
      background_color: '#FFFFFF',
      us_color: '#1F4E79',
      allies_color: '#2A6F4C',
      china_color: '#8B2323',
      text_color: '#1a1a1a',
      font_family: 'Cormorant Garamond',
      font_size: 48
    };

    async function onConfigChange(config) {
      // Update title
      const titleEl = document.getElementById('main-title');
      if (titleEl) {
        titleEl.textContent = config.main_title || defaultConfig.main_title;
        titleEl.style.color = config.text_color || defaultConfig.text_color;
        const fontFamily = config.font_family || defaultConfig.font_family;
        titleEl.style.fontFamily = `'${fontFamily}', serif`;
        const baseSize = config.font_size || defaultConfig.font_size;
        titleEl.style.fontSize = `${baseSize}px`;
      }

      // Update subtitle
      const subtitleEl = document.getElementById('subtitle');
      if (subtitleEl) {
        subtitleEl.textContent = config.subtitle || defaultConfig.subtitle;
        const baseSize = config.font_size || defaultConfig.font_size;
        subtitleEl.style.fontSize = `${baseSize * 0.3}px`;
      }

      // Update background
      const wrapper = document.getElementById('app-wrapper');
      if (wrapper) {
        wrapper.style.background = config.background_color || defaultConfig.background_color;
      }
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              config.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => config.us_color || defaultConfig.us_color,
            set: (value) => {
              config.us_color = value;
              window.elementSdk.setConfig({ us_color: value });
            }
          },
          {
            get: () => config.allies_color || defaultConfig.allies_color,
            set: (value) => {
              config.allies_color = value;
              window.elementSdk.setConfig({ allies_color: value });
            }
          },
          {
            get: () => config.china_color || defaultConfig.china_color,
            set: (value) => {
              config.china_color = value;
              window.elementSdk.setConfig({ china_color: value });
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => {
            config.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => {
            config.font_size = value;
            window.elementSdk.setConfig({ font_size: value });
          }
        }
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['subtitle', config.subtitle || defaultConfig.subtitle]
      ]);
    }

    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>
