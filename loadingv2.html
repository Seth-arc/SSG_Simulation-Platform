<!doctype html>
<html lang="loading screen" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Economic Statecraft</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
      margin: 0;
      background-color: #F8F8F6; /* Warm, paper-like off-white */
    }

    /* Cinematic Grain & Vignette */
    .texture-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
      z-index: 50;
      mix-blend-mode: multiply;
    }
    
    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle, rgba(248,248,246,0) 50%, rgba(200,200,195,0.3) 100%);
      z-index: 40;
    }

    /* Core Spheres */
    .sphere {
      border-radius: 50%;
      position: absolute;
      mix-blend-mode: multiply; /* Key for the overlapping effect */
      filter: blur(1px);
    }

    /* US - Deep Navy */
    .sphere-us {
      width: 220px;
      height: 220px;
      background: radial-gradient(circle at 30% 30%, #3B5998, #1A2B4C);
      opacity: 0.85;
      top: 50%;
      left: 50%;
      margin-top: -110px;
      margin-left: -110px;
      animation: orbit-us 35s ease-in-out infinite;
    }

    /* Allies - Muted Emerald */
    .sphere-allies {
      width: 160px;
      height: 160px;
      background: radial-gradient(circle at 30% 30%, #4E886D, #1E4435);
      opacity: 0.8;
      top: 50%;
      left: 50%;
      margin-top: -80px;
      margin-left: -80px;
      animation: orbit-allies 35s ease-in-out infinite;
    }

    /* China - Burnt Maroon */
    .sphere-china {
      width: 200px;
      height: 200px;
      background: radial-gradient(circle at 30% 30%, #C0392B, #641E16);
      opacity: 0.85;
      top: 50%;
      left: 50%;
      margin-top: -100px;
      margin-left: -100px;
      animation: orbit-china 35s ease-in-out infinite;
    }

    /* Slowed, heavy gravity animations */
    @keyframes orbit-us {
      0%, 100% { transform: translate(-80px, -60px) scale(1); }
      33% { transform: translate(60px, 80px) scale(0.95); }
      66% { transform: translate(20px, -40px) scale(1.05); }
    }

    @keyframes orbit-allies {
      0%, 100% { transform: translate(90px, 50px) scale(1); }
      33% { transform: translate(-100px, 20px) scale(0.9); }
      66% { transform: translate(40px, -90px) scale(1.1); }
    }

    @keyframes orbit-china {
      0%, 100% { transform: translate(20px, -80px) scale(1); }
      33% { transform: translate(40px, 90px) scale(1.05); }
      66% { transform: translate(-100px, -20px) scale(0.95); }
    }

    /* Tension Lines - Thinner, more subtle */
    .connection-line {
      position: absolute;
      height: 1px;
      transform-origin: left center;
      opacity: 0;
      animation: pulse-line 8s ease-in-out infinite;
    }

    @keyframes pulse-line {
      0%, 100% { opacity: 0.05; }
      50% { opacity: 0.25; }
    }

    .line-1 {
      background: linear-gradient(90deg, #1A2B4C, #641E16);
      width: 250px;
      top: 48%;
      left: 38%;
      transform: rotate(-15deg);
    }

    .line-2 {
      background: linear-gradient(90deg, #1E4435, #1A2B4C);
      width: 200px;
      top: 52%;
      left: 42%;
      transform: rotate(35deg);
      animation-delay: -2s;
    }

    /* Subtle Grid - faintly reminiscent of a map */
    .grid-overlay {
      position: absolute;
      inset: 0;
      background-image: 
        linear-gradient(rgba(100, 100, 100, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(100, 100, 100, 0.03) 1px, transparent 1px);
      background-size: 80px 80px;
      z-index: -1;
    }
  </style>
  <style>@view-transition { navigation: auto; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="h-full w-full relative overflow-hidden flex flex-col items-center justify-end pb-16">
    
    <div class="grid-overlay"></div>
    <div class="texture-overlay"></div>
    <div class="vignette"></div>

    <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
        <div class="relative w-[600px] h-[600px]">
            <div class="connection-line line-1"></div>
            <div class="connection-line line-2"></div>
            
            <div class="sphere sphere-us"></div>
            <div class="sphere sphere-china"></div>
            <div class="sphere sphere-allies"></div>
        </div>
    </div>

    <div class="relative z-50 text-center max-w-2xl px-4 animate-fade-in-up">
     <h1 id="main-title" class="text-3xl md:text-4xl mb-3 uppercase tracking-[0.2em]" style="font-family: 'Cormorant Garamond', serif; font-weight: 600; color: #1a1a1a;">Economic Statecraft</h1>
     <p id="subtitle" class="text-xs md:text-sm tracking-[0.3em] uppercase opacity-60" style="font-family: 'Montserrat', sans-serif; font-weight: 500; color: #4a4a4a;">Indo-Pacific Strategic Simulation</p>
    </div>

  </div>

  <script>
    const defaultConfig = {
      main_title: 'Economic Statecraft',
      subtitle: 'Indo-Pacific Strategic Simulation',
      background_color: '#F8F8F6',
      us_color: '#1A2B4C',
      allies_color: '#1E4435',
      china_color: '#641E16',
      text_color: '#1a1a1a',
      font_family: 'Cormorant Garamond',
      font_size: 36
    };

    async function onConfigChange(config) {
      // Update title
      const titleEl = document.getElementById('main-title');
      if (titleEl) {
        titleEl.textContent = config.main_title || defaultConfig.main_title;
        titleEl.style.color = config.text_color || defaultConfig.text_color;
        const fontFamily = config.font_family || defaultConfig.font_family;
        titleEl.style.fontFamily = `'${fontFamily}', serif`;
        const baseSize = config.font_size || defaultConfig.font_size;
        titleEl.style.fontSize = `${baseSize}px`;
      }

      // Update subtitle
      const subtitleEl = document.getElementById('subtitle');
      if (subtitleEl) {
        subtitleEl.textContent = config.subtitle || defaultConfig.subtitle;
        const baseSize = config.font_size || defaultConfig.font_size;
        subtitleEl.style.fontSize = `${Math.max(10, baseSize * 0.35)}px`; // Keep subtitle proportional but readable
      }

      // Update background
      const wrapper = document.getElementById('app-wrapper');
      if (wrapper) {
        wrapper.style.backgroundColor = config.background_color || defaultConfig.background_color;
      }
    }

    function mapToCapabilities(config) {
      return {
        recolorables: [
          {
            get: () => config.background_color || defaultConfig.background_color,
            set: (value) => {
              config.background_color = value;
              window.elementSdk.setConfig({ background_color: value });
            }
          },
          {
            get: () => config.text_color || defaultConfig.text_color,
            set: (value) => {
              config.text_color = value;
              window.elementSdk.setConfig({ text_color: value });
            }
          }
        ],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (value) => {
            config.font_family = value;
            window.elementSdk.setConfig({ font_family: value });
          }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (value) => {
            config.font_size = value;
            window.elementSdk.setConfig({ font_size: value });
          }
        }
      };
    }

    function mapToEditPanelValues(config) {
      return new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['subtitle', config.subtitle || defaultConfig.subtitle]
      ]);
    }

    // Initialize SDK
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange,
        mapToCapabilities,
        mapToEditPanelValues
      });
    }
  </script>
 </body>
</html>
